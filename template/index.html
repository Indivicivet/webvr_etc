<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>WebXR VR Template</title>
    <meta name="description" content="A clean, zero-build A-Frame VR template.">
    
    <!-- Premium Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <!-- Core Stylesheet -->
    <link rel="stylesheet" href="style.css">

    <!-- A-Frame Library -->
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
</head>
<body>
    <!-- Start Screen Overlay -->
    <div id="panel-start" class="overlay">
        <div class="glass-card">
            <header class="header">
                <div class="logo-badge">WEBXR</div>
                <h1>WebXR Playground</h1>
                <p class="subtitle">A minimal, zero-build virtual reality starter template using A-Frame.</p>
            </header>
            <footer class="footer">
                <button id="btn-start" class="btn btn-primary">Begin Experience</button>
            </footer>
        </div>
    </div>

    <!-- 3D Scene Viewport -->
    <a-scene embedded="false" vr-mode-ui="enabled: true" renderer="antialias: true; colorManagement: true;">
        <!-- Lighting -->
        <a-entity light="type: ambient; color: #1e163b; intensity: 0.8"></a-entity>
        <a-entity light="type: directional; color: #b58eff; intensity: 1.2" position="2 4 3"></a-entity>

        <!-- Environment: Sky and Grid Floor -->
        <a-sky color="#07050f"></a-sky>
        <a-plane position="0 0 0" rotation="-90 0 0" width="80" height="80" color="#ff007f" wireframe="true" material="shader: flat; opacity: 0.08"></a-plane>

        <!-- Interactive Target Shapes -->
        <a-box class="target" position="-1 1.5 -2" width="0.4" height="0.4" depth="0.4" color="#8b5cf6" material="roughness: 0.2; metalness: 0.8"></a-box>
        <a-sphere class="target" position="0 1.5 -2" radius="0.25" color="#ec4899" material="roughness: 0.2; metalness: 0.8"></a-sphere>
        <a-cylinder class="target" position="1 1.5 -2" radius="0.2" height="0.4" color="#06b6d4" material="roughness: 0.2; metalness: 0.8"></a-cylinder>

        <!-- Player Rig: Camera + Controls (Preventing mouse capture) -->
        <a-entity id="rig" position="0 0 0">
            <a-camera id="camera" look-controls="pointerLockEnabled: false" wasd-controls="enabled: false"></a-camera>
            <!-- VR Controllers -->
            <a-entity id="left-controller" laser-controls="hand: left" raycaster="objects: .target; far: 50" line="color: #00f3ff; opacity: 0.7"></a-entity>
            <a-entity id="right-controller" laser-controls="hand: right" raycaster="objects: .target; far: 50" line="color: #00f3ff; opacity: 0.7"></a-entity>
        </a-entity>

        <!-- Mouse Cursor for Desktop -->
        <a-entity id="mouse-cursor" cursor="rayOrigin: mouse" raycaster="objects: .target"></a-entity>
    </a-scene>

    <!-- Application Script -->
    <script src="app.js"></script>
</body>
</html>
